<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title id="dynamicTitle">aser Web · studio [AR/EN]</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter + Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Swiper (light) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <!-- Firebase (legacy + modular) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(-45deg, #667eea, #764ba2, #6b8cff, #a363d9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #1e1e2f;
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }
        body[dir="rtl"] { font-family: 'Cairo', 'Inter', sans-serif; }
        @keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .brand {
            text-align: center;
            padding: 1.2rem 1rem 0.4rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .brand h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #f0f3fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .brand p { color: rgba(255,255,255,0.9); font-weight: 400; margin-top: 0.2rem; }

        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .lang-toggle:hover { background: linear-gradient(135deg, #667eea, #764ba2); transform: scale(1.05); }

        .offer-bar {
            background: rgba(12,20,36,0.9);
            backdrop-filter: blur(5px);
            color: #ffdb9d;
            padding: 15px 0;
            overflow: hidden;
            white-space: nowrap;
            border-block: 2px solid rgba(255,255,255,0.15);
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .offer-bar .offer-slide {
            display: inline-block;
            animation: scrollOffer 30s linear infinite;
        }
        .offer-bar .offer-slide span {
            margin-right: 60px;
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .offer-bar .offer-slide i { margin: 0 15px; color: #ffb86b; font-size: 1.1rem; }
        @keyframes scrollOffer { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .video-slider { max-width: 1300px; margin: 2rem auto 1.5rem; padding: 0 20px; }
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 40px;
            overflow: hidden;
            aspect-ratio: 16 / 7;
            background: #111a2b;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.5);
        }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-container .video-badge-text {
            position: absolute;
            bottom: 20px;
            left: 30px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: calc(100% - 60px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 10;
        }

        .design-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 25px;
        }
        .design-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        .design-card:hover { transform: translateY(-10px); }
        .card-media {
            aspect-ratio: 1/1;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 3px solid white;
            position: relative;
            background: #000;
        }
        .card-media video { width: 100%; height: 100%; object-fit: cover; display: block; animation: subtleZoom 8s infinite alternate ease-in-out; }
        @keyframes subtleZoom { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        .video-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(3px);
        }
        .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .design-title { font-size: 1.6rem; font-weight: 900; background: linear-gradient(145deg, #121826, #2c3a6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .price-row { display: flex; gap: 5px; background: #eef2f9; padding: 5px 14px; border-radius: 60px; font-weight: 700; }
        .design-desc { color: #2f405c; font-size: 0.95rem; margin: 12px 0 15px; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-open, .btn-buy { flex: 1; border-radius: 50px; padding: 12px; cursor: pointer; border: none; font-weight: 700; transition: transform 0.2s; }
        .btn-open { background: white; border: 2px solid #1d2b44; color: #1d2b44; }
        .btn-buy { background: #ff8a4c; color: white; box-shadow: 0 5px 12px #ff8a4c80; }
        .btn-open:hover, .btn-buy:hover { transform: translateY(-2px); }

        .seo-footer {
            background: rgba(12,20,36,0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(255,255,255,0.15);
            border-bottom: 2px solid rgba(255,255,255,0.15);
            padding: 25px 20px;
            margin-top: 40px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        .seo-container { max-width: 1300px; margin: 0 auto; }
        .seo-title { color: #ffb86b; font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .seo-words-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 15px;
            scrollbar-width: thin;
            scrollbar-color: #667eea #2d2d4a;
        }
        .seo-words-wrapper::-webkit-scrollbar { height: 8px; }
        .seo-words-wrapper::-webkit-scrollbar-track { background: #2d2d4a; border-radius: 10px; }
        .seo-words-wrapper::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; }
        .seo-words { display: flex; flex-wrap: nowrap; gap: 15px; min-width: min-content; padding: 5px 0; }
        .seo-word {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            animation: floatWord 3s ease-in-out infinite;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .seo-word:nth-child(odd) { animation-delay: 0.5s; } .seo-word:nth-child(3n) { animation-delay: 1s; } .seo-word:nth-child(5n) { animation-delay: 1.5s; }
        @keyframes floatWord { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-5px) scale(1.05);} }
        .seo-word:hover { background: linear-gradient(135deg, #667eea, #764ba2); transform: scale(1.1) translateY(-5px); cursor: pointer; }

        .admin-btn {
            position: fixed;
            right: 25px;
            bottom: 25px;
            z-index: 1500;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            border: 3px solid white;
            animation: pulse 2s infinite;
            font-size: 24px;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

        /* admin panel (identical, just extended with bilingual fields) */
        .admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow: auto;
            direction: rtl;
            font-family: 'Cairo', 'Inter', sans-serif;
        }
        .admin-box {
            max-width: 1400px;
            margin: auto;
            background: #1a1c2e;
            color: #fff;
            border-radius: 30px;
            box-shadow: 0 35px 90px rgba(0,0,0,0.6);
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .admin-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .admin-header h2 { margin: 0; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; }
        .close-admin { background: #ff4444; border: none; color: white; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 1rem; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 25px; }
        .tab { padding: 12px 25px; border-radius: 50px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }
        .panel { display: none; }
        .panel.active { display: block; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 8px; font-weight: 700; color: rgba(255,255,255,0.9); font-size: 1rem; }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
        }
        .field textarea { min-height: 100px; resize: vertical; line-height: 1.7; }
        .helper-text { font-size: 0.85rem; color: #ffb86b; margin-top: 5px; }
        .lang-row { display: flex; gap: 10px; align-items: center; }
        .lang-row input { flex: 1; }
        .lang-badge { background: #667eea; padding: 5px 10px; border-radius: 40px; font-size: 0.9rem; }
        .save-btn {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin: 15px 0;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .save-btn:hover { transform: translateY(-2px); }
        .items-list { margin-top: 25px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; max-height: 450px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; gap: 15px; padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px; background: rgba(255,255,255,0.02); }
        .item-info { flex: 1; }
        .item-info .title { font-weight: 700; margin-bottom: 5px; font-size: 1.1rem; }
        .danger-btn { background: #ff4444; border: none; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 700; }
        .success-btn { background: #28a745; border: none; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 700; }
        /* preview/purchase modals same */
        .preview-modal, .purchase-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 3000; visibility: hidden; opacity: 0; transition: 0.2s; padding: 20px; }
        .preview-modal.active, .purchase-modal.active { visibility: visible; opacity: 1; }
        .preview-content, .purchase-content { background: white; max-width: 1300px; width: 100%; border-radius: 40px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .purchase-content { max-width: 500px; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .iframe-container { width: 100%; height: 65vh; border-radius: 20px; overflow: hidden; border: 2px solid #eef2f9; }
        .iframe-container iframe { width: 100%; height: 100%; border: none; }
        .preview-note { margin-top: 15px; padding: 12px; background: #fff3cd; border-radius: 40px; text-align: center; }
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 18px; width: 100%; border-radius: 40px; font-weight: 700; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        .close-purchase-btn { margin-top: 10px; width: 100%; padding: 15px; border-radius: 40px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 600; }
        @media (max-width:768px){ .brand h1{font-size:2rem;} }
    </style>
</head>
<body dir="ltr">
    <!-- language toggle button -->
    <div class="lang-toggle" onclick="toggleLanguage()"><i class="fas fa-language"></i> <span id="langBtnText">AR</span></div>

    <div class="brand"><h1 id="siteTitle">آسر للتصميم · ASER STUDIO</h1><p id="siteSubtitle">motion · identity · digital squares</p></div>
    <div class="offer-bar"><div class="offer-slide" id="offerSlide"></div></div>

    <div class="video-slider">
        <div class="video-container">
            <video id="mainVideo" autoplay muted loop playsinline><source id="videoSource" src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" type="video/mp4"></video>
            <div class="video-badge-text" id="mainVideoBadge">⚡ ASER SHOWREEL • always moving</div>
        </div>
    </div>

    <div class="design-grid" id="designGrid"></div>

    <div class="seo-footer">
        <div class="seo-container">
            <div class="seo-title" id="seoTitle"><i class="fas fa-tags"></i> POPULAR SEARCH TERMS</div>
            <div class="seo-words-wrapper"><div class="seo-words" id="seoWords"></div></div>
        </div>
    </div>

    <div class="admin-btn" onclick="showAdminPanel()"><i class="fas fa-cog"></i></div>

    <!-- ADMIN PANEL (bilingual) -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-box">
            <div class="admin-header"><h2><i class="fas fa-crown"></i> لوحة التحكم - ثنائية اللغة</h2><button class="close-admin" onclick="hideAdminPanel()"><i class="fas fa-times"></i> إغلاق</button></div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('designs')"><i class="fas fa-paint-brush"></i> التصميمات</button>
                <button class="tab" onclick="switchTab('offers')"><i class="fas fa-tags"></i> العروض AR/EN</button>
                <button class="tab" onclick="switchTab('seo')"><i class="fas fa-search"></i> كلمات SEO AR/EN</button>
                <button class="tab" onclick="switchTab('settings')"><i class="fas fa-sliders-h"></i> الإعدادات</button>
                <button class="tab" onclick="switchTab('texts')"><i class="fas fa-font"></i> نصوص واتساب AR/EN</button>
                <button class="tab" onclick="switchTab('site')"><i class="fas fa-globe"></i> عنوان الموقع AR/EN</button>
                <button class="tab" onclick="switchTab('browserTitle')"><i class="fas fa-window-maximize"></i> عنوان المتصفح AR/EN</button>
                <button class="tab" onclick="switchTab('videobadge')"><i class="fas fa-video"></i> كلمة الفيديو AR/EN</button>
                <button class="tab" onclick="switchTab('export')"><i class="fas fa-download"></i> تصدير/استيراد</button>
            </div>

            <!-- designs (title, desc become bilingual) -->
            <div id="tab-designs" class="panel active">
                <div class="grid-2">
                    <div class="field"><label>🇬🇧 عنوان EN</label><input id="designTitleEn" placeholder="e.g. Business site"></div>
                    <div class="field"><label>🇸🇦 عنوان AR</label><input id="designTitleAr" placeholder="مثلاً: موقع شركة"></div>
                    <div class="field"><label>💰 السعر</label><input id="designPrice" type="number" value="299"></div>
                    <div class="field"><label>🎬 رابط الفيديو</label><input id="designVideo" placeholder="https://...mp4"></div>
                    <div class="field"><label>🔗 رابط المعاينة</label><input id="designPreview" placeholder="https://..."></div>
                    <div class="field" style="grid-column:1/-1"><label>🇬🇧 وصف EN</label><textarea id="designDescEn" placeholder="Description..."></textarea></div>
                    <div class="field" style="grid-column:1/-1"><label>🇸🇦 وصف AR</label><textarea id="designDescAr" placeholder="الوصف بالعربية..."></textarea></div>
                </div>
                <button class="save-btn" onclick="addDesign()"><i class="fas fa-plus"></i> إضافة تصميم جديد</button>
                <div class="items-list" id="designsList"></div>
            </div>
            <!-- offers bilingual -->
            <div id="tab-offers" class="panel">
                <div class="field"><label>🇬🇧 Offers (one per line)</label><textarea id="offerTextEn" placeholder="FLASH 25% OFF ..."></textarea></div>
                <div class="field"><label>🇸🇦 العروض (سطر لكل عرض)</label><textarea id="offerTextAr" placeholder="خصم ٢٥٪ ..."></textarea></div>
                <button class="save-btn" onclick="updateOffers()"><i class="fas fa-save"></i> حفظ العروض</button>
            </div>
            <!-- seo bilingual -->
            <div id="tab-seo" class="panel">
                <div class="field"><label>🇬🇧 SEO words (one per line)</label><textarea id="seoTextEn" placeholder="Web Design\nUI/UX"></textarea></div>
                <div class="field"><label>🇸🇦 كلمات SEO (سطر لكل كلمة)</label><textarea id="seoTextAr" placeholder="تصميم ويب\nتجربة مستخدم"></textarea></div>
                <button class="save-btn" onclick="updateSeoWords()"><i class="fas fa-save"></i> حفظ الكلمات</button>
            </div>
            <!-- settings (currency, video url) -->
            <div id="tab-settings" class="panel">
                <div class="field"><label>💱 رمز العملة</label><input id="currencySymbolInput" value="$"></div>
                <div class="field"><label>🎬 رابط الفيديو الرئيسي</label><input id="videoUrl" value="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4"></div>
                <button class="save-btn" onclick="updateSettings()"><i class="fas fa-save"></i> حفظ الإعدادات</button>
            </div>
            <!-- texts (whatsapp + buttons) bilingual -->
            <div id="tab-texts" class="panel">
                <h3 style="color:#ffb86b;">📱 واتساب AR/EN</h3>
                <div class="grid-2">
                    <div class="field"><label>📱 رقم واتساب</label><input id="whatsappNumber" value="201507881044"></div>
                    <div class="field"><label>🌍 مفتاح الدولة</label><input id="countryCode" value="20"></div>
                    <div class="field"><label>🇬🇧 Name label</label><input id="textNameEn" value="Name"></div>
                    <div class="field"><label>🇸🇦 الاسم</label><input id="textNameAr" value="الاسم"></div>
                    <div class="field"><label>🇬🇧 Phone label</label><input id="textPhoneEn" value="Phone"></div>
                    <div class="field"><label>🇸🇦 رقم الهاتف</label><input id="textPhoneAr" value="رقم الهاتف"></div>
                    <div class="field"><label>🇬🇧 Details placeholder</label><input id="textDetailsEn" value="Order details..."></div>
                    <div class="field"><label>🇸🇦 تفاصيل الطلب</label><input id="textDetailsAr" value="تفاصيل الطلب..."></div>
                    <div class="field"><label>🇬🇧 WhatsApp button</label><input id="textWhatsAppEn" value="Order via WhatsApp"></div>
                    <div class="field"><label>🇸🇦 طلب عبر واتساب</label><input id="textWhatsAppAr" value="طلب عبر واتساب"></div>
                    <div class="field"><label>🇬🇧 Close button (purchase)</label><input id="textCloseEn" value="Close"></div>
                    <div class="field"><label>🇸🇦 إغلاق</label><input id="textCloseAr" value="إغلاق"></div>
                </div>
                <h3 style="color:#ffb86b;">🔍 Preview modal AR/EN</h3>
                <div class="grid-2">
                    <div class="field"><label>🇬🇧 Refresh</label><input id="textRefreshEn" value="Refresh"></div><div class="field"><label>🇸🇦 تحديث</label><input id="textRefreshAr" value="تحديث"></div>

<script>
    // firebase legacy
    const firebaseConfig = {
        apiKey: "AIzaSyCkign3vnAZ6X1cCaAUvN3cVUaGpIigGNQ",
        authDomain: "mostafaaser-b0053.firebaseapp.com",
        databaseURL: "https://mostafaaser-b0053-default-rtdb.firebaseio.com",
        projectId: "mostafaaser-b0053",
        storageBucket: "mostafaaser-b0053.firebasestorage.app",
        messagingSenderId: "336529119748",
        appId: "1:336529119748:web:6d02cee38c7965bda8f351"
    };
    let database;
    try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); database = firebase.database(); } catch(e){}

    // ---------- GLOBAL BILINGUAL DATA ----------
    let globalData = {
        designs: [
            // تم إزالة التصميمات الافتراضية لتبدأ بصفحة نظيفة. يمكنك إضافة تصميماتك عبر لوحة التحكم.
        ],
        settings: {
            offersEn: ["🔥 FLASH 25% OFF", "✨ FREE CONSULTATION"],
            offersAr: ["🔥 خصم ٢٥٪", "✨ استشارة مجانية"],
            seoWordsEn: ["Web Design", "UI/UX", "E-commerce"],
            seoWordsAr: ["تصميم ويب", "تجربة مستخدم", "متجر إلكتروني"],
            currency: "$",
            videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
            siteTitleEn: "ASER STUDIO",
            siteTitleAr: "آسر للتصميم",
            siteSubtitleEn: "motion · identity · digital squares",
            siteSubtitleAr: "موشن · هوية · ساحات رقمية",
            browserTitleEn: "aser Web · studio",
            browserTitleAr: "آسر ويب · ستوديو",
            videoBadgeEn: "⚡ ASER SHOWREEL • always moving",
            videoBadgeAr: "⚡ عرض آسر • دائم الحركة",
            texts: {
                whatsappNumber: "201507881044", countryCode: "20",
                nameEn: "Name", nameAr: "الاسم",
                phoneEn: "Phone", phoneAr: "رقم الهاتف",
                detailsEn: "Order details...", detailsAr: "تفاصيل الطلب...",
                whatsappEn: "Order via WhatsApp", whatsappAr: "طلب عبر واتساب",
                closeEn: "Close", closeAr: "إغلاق",
                refreshEn: "Refresh", refreshAr: "تحديث",
                newTabEn: "Open in new tab", newTabAr: "فتح في تاب جديد",
                previewCloseEn: "Close", previewCloseAr: "إغلاق",
                previewNoteEn: "⚠️ Some sites block iframe", previewNoteAr: "⚠️ بعض المواقع تمنع العرض",
                cardOpenEn: "open", cardOpenAr: "open",
                cardBuyEn: "buy now", cardBuyAr: "buy now"
            }
        }
    };
    let currentLang = 'en'; // 'en' or 'ar'
    function toggleLanguage() {
        currentLang = (currentLang === 'en' ? 'ar' : 'en');
        document.getElementById('langBtnText').innerText = (currentLang === 'en' ? 'AR' : 'EN');
        document.body.dir = (currentLang === 'ar' ? 'rtl' : 'ltr');
        renderDesigns(); updateOfferBar(); updateSeoWordsDisplay(); updateSiteTitleDisplay(); updateBrowserTitleDisplay(); applyCustomTexts(); applyVideoBadge();
    }

    // load/save
    function loadData() {
        try {
            const s = localStorage.getItem('aser_bilingual_data');
            if(s) {
                const p = JSON.parse(s);
                // دمج البيانات المحفوظة مع الهيكل الافتراضي لضمان وجود جميع الحقول
                if(p.designs) globalData.designs = p.designs;
                if(p.settings) {
                    // دمج عميق للإعدادات للحفاظ على القيم الافتراضية للحقول الجديدة
                    globalData.settings = {...globalData.settings, ...p.settings};
                    // دمج النصوص بشكل آمن
                    if(p.settings.texts) {
                        globalData.settings.texts = {...globalData.settings.texts, ...p.settings.texts};
                    }
                }
            } else {
                // إذا لم يكن هناك بيانات محفوظة، نبدأ بمصفوفة تصميمات فارغة كما هو معرف أعلاه
                console.log("لا توجد بيانات محفوظة، بدء بمصفوفة تصميمات فارغة.");
            }
        } catch(e){
            console.error("خطأ في تحميل البيانات", e);
        }
    }
    function saveData() {
        globalData.lastUpdated = new Date().toISOString();
        localStorage.setItem('aser_bilingual_data', JSON.stringify(globalData));
        if(database) database.ref('aser_studio_bilingual').set(globalData).catch(()=>{});
        showNotification('✅ تم الحفظ');
    }
    function showNotification(m) {
        const n = document.createElement('div');
        n.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:12px 30px;border-radius:50px;z-index:9999;font-weight:bold;box-shadow:0 5px 15px rgba(0,0,0,0.3);animation:slideDown 0.3s ease;';
        n.textContent = m;
        document.body.appendChild(n);
        setTimeout(()=>{ n.style.animation='slideUp 0.3s ease'; setTimeout(()=>n.remove(),300); },2000);
    }

    // rendering functions using currentLang
    function renderDesigns() {
        const grid = document.getElementById('designGrid');
        if (!grid) return;
        grid.innerHTML = '';
        const t = globalData.settings.texts;
        const openTxt = currentLang === 'en' ? t.cardOpenEn : t.cardOpenAr;
        const buyTxt = currentLang === 'en' ? t.cardBuyEn : t.cardBuyAr;

        if (globalData.designs.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:white; font-size:1.5rem; padding:50px;">👋 أهلاً بك! قم بإضافة أول تصميم لك من لوحة التحكم.</div>';
            return;
        }

        globalData.designs.forEach(d => {
            const title = currentLang === 'en' ? d.titleEn : d.titleAr;
            const desc = currentLang === 'en' ? d.descEn : d.descAr;
            grid.innerHTML += `
                <div class="design-card">
                    <div class="card-media"><video autoplay muted loop playsinline><source src="${d.video}" type="video/mp4"></video><div class="video-badge"><i class="fas fa-play"></i></div></div>
                    <div class="card-header"><span class="design-title">${title || 'No Title'}</span><div class="price-row">${globalData.settings.currency}${d.price}</div></div>
                    <div class="design-desc">${desc || ''}</div>
                    <div class="card-actions"><button class="btn-open" onclick="openPreview(${d.id})"><i class="fa-regular fa-eye"></i> ${openTxt}</button><button class="btn-buy" onclick="openPurchase(${d.id})"><i class="fa-solid fa-cart-shopping"></i> ${buyTxt}</button></div>
                </div>`;
        });
        setTimeout(()=>{ document.querySelectorAll('.card-media video').forEach(v=> v.play().catch(e=>{})); },200);
    }
    function updateOfferBar() {
        let arr = currentLang === 'en' ? (globalData.settings.offersEn || []) : (globalData.settings.offersAr || []);
        let html = ''; for(let i=0;i<2;i++) arr.forEach(o => html += `<span>${o}</span> <i class="fa-regular fa-star"></i> `);
        document.getElementById('offerSlide').innerHTML = html || '<span>🔥</span>';
    }
    function updateSeoWordsDisplay() {
        const cont = document.getElementById('seoWords'); if(!cont) return;
        cont.innerHTML = '';
        const words = currentLang === 'en' ? (globalData.settings.seoWordsEn || []) : (globalData.settings.seoWordsAr || []);
        words.forEach(w => {
            const s = document.createElement('span'); s.className = 'seo-word'; s.textContent = w;
            s.onclick = ()=> window.open(`https://www.google.com/search?q=${encodeURIComponent(w)}`,'_blank');
            cont.appendChild(s);
        });
        const seoTitle = document.getElementById('seoTitle');
        if(seoTitle) seoTitle.innerHTML = `<i class="fas fa-tags"></i> ${currentLang==='en'?'POPULAR SEARCH TERMS':'كلمات بحث شائعة'}`;
    }
    function updateSiteTitleDisplay() {
        const siteTitleEl = document.getElementById('siteTitle');
        const siteSubtitleEl = document.getElementById('siteSubtitle');
        if(siteTitleEl) siteTitleEl.textContent = currentLang==='en'? globalData.settings.siteTitleEn : globalData.settings.siteTitleAr;
        if(siteSubtitleEl) siteSubtitleEl.textContent = currentLang==='en'? globalData.settings.siteSubtitleEn : globalData.settings.siteSubtitleAr;
    }
    function updateBrowserTitleDisplay() {
        const titleEl = document.getElementById('dynamicTitle');
        if(titleEl) titleEl.textContent = currentLang==='en'? globalData.settings.browserTitleEn : globalData.settings.browserTitleAr;
    }
    function applyCustomTexts() {
        const t = globalData.settings.texts;
        const clientName = document.getElementById('clientName');
        const clientPhone = document.getElementById('clientPhone');
        const clientDetails = document.getElementById('clientDetails');
        const whatsappBtn = document.getElementById('whatsappBtn');
        const closePurchaseBtn = document.getElementById('closePurchaseBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const previewOpenNewTab = document.getElementById('previewOpenNewTab');
        const closePreviewBtn = document.getElementById('closePreviewBtn');
        const previewNote = document.getElementById('previewNote');

        if(clientName) clientName.placeholder = currentLang==='en'? t.nameEn : t.nameAr;
        if(clientPhone) clientPhone.placeholder = currentLang==='en'? t.phoneEn : t.phoneAr;
        if(clientDetails) clientDetails.placeholder = currentLang==='en'? t.detailsEn : t.detailsAr;
        if(whatsappBtn) whatsappBtn.innerHTML = `<i class="fab fa-whatsapp"></i> ${currentLang==='en'? t.whatsappEn : t.whatsappAr}`;
        if(closePurchaseBtn) closePurchaseBtn.textContent = currentLang==='en'? t.closeEn : t.closeAr;
        if(refreshBtn) refreshBtn.innerHTML = `<i class="fas fa-redo"></i> ${currentLang==='en'? t.refreshEn : t.refreshAr}`;
        if(previewOpenNewTab) previewOpenNewTab.innerHTML = `<i class="fas fa-external-link-alt"></i> ${currentLang==='en'? t.newTabEn : t.newTabAr}`;
        if(closePreviewBtn) closePreviewBtn.innerHTML = `<i class="fas fa-times"></i> ${currentLang==='en'? t.previewCloseEn : t.previewCloseAr}`;
        if(previewNote) previewNote.innerHTML = `<i class="fas fa-info-circle"></i> ${currentLang==='en'? t.previewNoteEn : t.previewNoteAr}`;
    }
    function applyVideoBadge() {
        const badge = document.getElementById('mainVideoBadge');
        if(badge) badge.textContent = currentLang==='en'? globalData.settings.videoBadgeEn : globalData.settings.videoBadgeAr;
    }

    // preview/purchase
    window.openPreview = function(id) {
        const d = globalData.designs.find(x=>x.id===id); if(!d) return;
        let url = d.preview || 'about:blank'; if(!url.startsWith('http')) url = 'https://'+url;
        const previewTitle = document.getElementById('previewTitle');
        const previewOpenNewTab = document.getElementById('previewOpenNewTab');
        const previewFrame = document.getElementById('previewFrame');
        if(previewTitle) previewTitle.textContent = currentLang==='en'? d.titleEn : d.titleAr;
        if(previewOpenNewTab) previewOpenNewTab.href = url;
        if(previewFrame) previewFrame.src = url;
        const modal = document.getElementById('previewModal');
        if(modal) {
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    };
    window.reloadPreviewFrame = ()=> { let f = document.getElementById('previewFrame'); if(f) f.src = f.src; };
    window.closePreviewModal = ()=> {
        const modal = document.getElementById('previewModal');
        const frame = document.getElementById('previewFrame');
        if(modal) modal.classList.remove('active');
        if(frame) frame.src = 'about:blank';
        document.body.style.overflow = 'auto';
    };
    let currentPurchaseId = null;
    window.openPurchase = function(id) {
        const d = globalData.designs.find(x=>x.id===id); if(!d) return;
        currentPurchaseId = id;
        const purchaseTitle = document.getElementById('purchaseTitle');
        const purchaseDesc = document.getElementById('purchaseDesc');
        if(purchaseTitle) purchaseTitle.textContent = currentLang==='en'? d.titleEn : d.titleAr;
        if(purchaseDesc) purchaseDesc.textContent = `${currentLang==='en'? d.descEn : d.descAr} | ${globalData.settings.currency}${d.price}`;
        applyCustomTexts();
        const modal = document.getElementById('purchaseModal');
        if(modal) modal.classList.add('active');
    };
    window.closePurchaseModal = ()=> {
        const modal = document.getElementById('purchaseModal');
        if(modal) modal.classList.remove('active');
    };
    window.sendWhatsApp = function() {
        const name = document.getElementById('clientName')?.value || '';
        const phone = document.getElementById('clientPhone')?.value || '';
        const details = document.getElementById('clientDetails')?.value || '';
        const d = globalData.designs.find(x=>x.id === currentPurchaseId);
        if(!d) return;
        const t = globalData.settings.texts;
        if(!name || !phone) {
            alert(`الرجاء إدخال ${currentLang==='en'? t.nameEn : t.nameAr} و ${currentLang==='en'? t.phoneEn : t.phoneAr}`);
            return;
        }
        const fullNum = (t.countryCode || '20') + phone.replace(/^0+/,'');
        const msg = currentLang==='en'?
            `Hello ASER studio, I want to order: *${d.titleEn}* (${globalData.settings.currency}${d.price}). Name: ${name}. Phone: ${phone}. Details: ${details}` :
            `مرحباً آسر ستوديو، أريد طلب تصميم: *${d.titleAr}* (${globalData.settings.currency}${d.price}). الاسم: ${name}. الهاتف: ${phone}. التفاصيل: ${details}`;
        window.open(`https://wa.me/${fullNum}?text=${encodeURIComponent(msg)}`,'_blank');
        closePurchaseModal();
    };

    // admin functions – update lists, add, edit, delete with bilingual fields
    function updateDesignsList() {
        const list = document.getElementById('designsList');
        if(!list) return;
        list.innerHTML = globalData.designs.map(d=>`<div class="list-item"><div class="item-info"><div class="title">${d.titleEn || ''} | ${d.titleAr || ''}</div><div class="meta">${globalData.settings.currency}${d.price}</div></div><div><button class="success-btn" onclick="editDesign(${d.id})"><i class="fas fa-edit"></i></button><button class="danger-btn" onclick="deleteDesign(${d.id})"><i class="fas fa-trash"></i></button></div></div>`).join('');
    }
    window.addDesign = function() {
        const titleEn = document.getElementById('designTitleEn')?.value;
        const titleAr = document.getElementById('designTitleAr')?.value;
        const price = parseFloat(document.getElementById('designPrice')?.value)||299;
        const video = document.getElementById('designVideo')?.value;
        const preview = document.getElementById('designPreview')?.value||'https://example.com';
        const descEn = document.getElementById('designDescEn')?.value||'';
        const descAr = document.getElementById('designDescAr')?.value||'';
        if(!titleEn || !titleAr || !video) { alert('العناوين (EN/AR) والفيديو مطلوبة'); return; }
        const newId = Math.max(...globalData.designs.map(d=>d.id),0)+1;
        globalData.designs.push({id:newId, titleEn, titleAr, price, video, preview, descEn, descAr});
        saveData(); renderDesigns(); updateDesignsList();
        // مسح الحقول
        document.getElementById('designTitleEn').value = '';
        document.getElementById('designTitleAr').value = '';
        document.getElementById('designVideo').value = '';
        document.getElementById('designPreview').value = '';
        document.getElementById('designDescEn').value = '';
        document.getElementById('designDescAr').value = '';
    };
    window.editDesign = function(id) {
        const d = globalData.designs.find(x=>x.id===id); if(!d) return;
        const newTitleEn = prompt('Edit EN title:', d.titleEn);
        if(newTitleEn !== null) d.titleEn = newTitleEn;
        const newTitleAr = prompt('تعديل العنوان AR:', d.titleAr);
        if(newTitleAr !== null) d.titleAr = newTitleAr;
        const newPrice = prompt('Price:', d.price);
        if(newPrice !== null) d.price = parseFloat(newPrice) || d.price;
        const newVideo = prompt('Video URL:', d.video);
        if(newVideo !== null) d.video = newVideo;
        const newPreview = prompt('Preview URL:', d.preview);
        if(newPreview !== null) d.preview = newPreview;
        const newDescEn = prompt('EN desc:', d.descEn);
        if(newDescEn !== null) d.descEn = newDescEn;
        const newDescAr = prompt('AR desc:', d.descAr);
        if(newDescAr !== null) d.descAr = newDescAr;
        saveData(); renderDesigns(); updateDesignsList();
    };
    window.deleteDesign = function(id) { if(!confirm('متأكد؟')) return; globalData.designs = globalData.designs.filter(d=>d.id!==id); saveData(); renderDesigns(); updateDesignsList(); };
    window.updateOffers = function() {
        globalData.settings.offersEn = document.getElementById('offerTextEn')?.value.split('\n').filter(Boolean) || [];
        globalData.settings.offersAr = document.getElementById('offerTextAr')?.value.split('\n').filter(Boolean) || [];
        updateOfferBar(); saveData();
    };
    window.updateSeoWords = function() {
        globalData.settings.seoWordsEn = document.getElementById('seoTextEn')?.value.split('\n').filter(Boolean) || [];
        globalData.settings.seoWordsAr = document.getElementById('seoTextAr')?.value.split('\n').filter(Boolean) || [];
        updateSeoWordsDisplay(); saveData();
    };
    window.updateSettings = function() {
        globalData.settings.currency = document.getElementById('currencySymbolInput')?.value || '$';
        const vid = document.getElementById('videoUrl')?.value;
        if(vid) {
            globalData.settings.videoUrl = vid;
            const videoSource = document.getElementById('videoSource');
            const mainVideo = document.getElementById('mainVideo');
            if(videoSource) videoSource.src = vid;
            if(mainVideo) { mainVideo.load(); mainVideo.play(); }
        }
        saveData(); renderDesigns();
    };
    window.updateTexts = function() {
        globalData.settings.texts = {
            whatsappNumber: document.getElementById('whatsappNumber')?.value || '',
            countryCode: document.getElementById('countryCode')?.value || '20',
            nameEn: document.getElementById('textNameEn')?.value || 'Name',
            nameAr: document.getElementById('textNameAr')?.value || 'الاسم',
            phoneEn: document.getElementById('textPhoneEn')?.value || 'Phone',
            phoneAr: document.getElementById('textPhoneAr')?.value || 'رقم الهاتف',
            detailsEn: document.getElementById('textDetailsEn')?.value || 'Order details...',
            detailsAr: document.getElementById('textDetailsAr')?.value || 'تفاصيل الطلب...',
            whatsappEn: document.getElementById('textWhatsAppEn')?.value || 'Order via WhatsApp',
            whatsappAr: document.getElementById('textWhatsAppAr')?.value || 'طلب عبر واتساب',
            closeEn: document.getElementById('textCloseEn')?.value || 'Close',
            closeAr: document.getElementById('textCloseAr')?.value || 'إغلاق',
            refreshEn: document.getElementById('textRefreshEn')?.value || 'Refresh',
            refreshAr: document.getElementById('textRefreshAr')?.value || 'تحديث',
            newTabEn: document.getElementById('textNewTabEn')?.value || 'Open in new tab',
            newTabAr: document.getElementById('textNewTabAr')?.value || 'فتح في تاب جديد',
            previewCloseEn: document.getElementById('textPreviewCloseEn')?.value || 'Close',
            previewCloseAr: document.getElementById('textPreviewCloseAr')?.value || 'إغلاق',
            previewNoteEn: document.getElementById('textPreviewNoteEn')?.value || '⚠️ Some sites block iframe',
            previewNoteAr: document.getElementById('textPreviewNoteAr')?.value || '⚠️ بعض المواقع تمنع العرض',
            cardOpenEn: document.getElementById('textCardOpenEn')?.value || 'open',
            cardOpenAr: document.getElementById('textCardOpenAr')?.value || 'open',
            cardBuyEn: document.getElementById('textCardBuyEn')?.value || 'buy now',
            cardBuyAr: document.getElementById('textCardBuyAr')?.value || 'buy now'
        };
        saveData(); applyCustomTexts(); renderDesigns();
    };
    window.updateSiteTitle = function() {
        globalData.settings.siteTitleEn = document.getElementById('siteTitleEn')?.value || 'ASER STUDIO';
        globalData.settings.siteTitleAr = document.getElementById('siteTitleAr')?.value || 'آسر للتصميم';
        globalData.settings.siteSubtitleEn = document.getElementById('siteSubtitleEn')?.value || 'motion · identity · digital squares';
        globalData.settings.siteSubtitleAr = document.getElementById('siteSubtitleAr')?.value || 'موشن · هوية · ساحات رقمية';
        updateSiteTitleDisplay(); saveData();
    };
    window.updateBrowserTitle = function() {
        globalData.settings.browserTitleEn = document.getElementById('browserTitleEn')?.value || 'aser Web · studio';
        globalData.settings.browserTitleAr = document.getElementById('browserTitleAr')?.value || 'آسر ويب · ستوديو';
        updateBrowserTitleDisplay(); saveData();
    };
    window.updateVideoBadge = function() {
        globalData.settings.videoBadgeEn = document.getElementById('videoBadgeEn')?.value || '⚡ ASER SHOWREEL • always moving';
        globalData.settings.videoBadgeAr = document.getElementById('videoBadgeAr')?.value || '⚡ عرض آسر • دائم الحركة';
        applyVideoBadge(); saveData();
    };
    window.showAdminPanel = function() {
        if(prompt('كلمة السر:') !== '332004') { alert('كلمة سر خطأ'); return; }
        updateDesignsList();
        // تعبئة الحقول بالبيانات الحالية
        document.getElementById('offerTextEn').value = (globalData.settings.offersEn || []).join('\n');
        document.getElementById('offerTextAr').value = (globalData.settings.offersAr || []).join('\n');
        document.getElementById('seoTextEn').value = (globalData.settings.seoWordsEn || []).join('\n');
        document.getElementById('seoTextAr').value = (globalData.settings.seoWordsAr || []).join('\n');
        document.getElementById('currencySymbolInput').value = globalData.settings.currency;
        document.getElementById('videoUrl').value = globalData.settings.videoUrl;
        document.getElementById('siteTitleEn').value = globalData.settings.siteTitleEn || '';
        document.getElementById('siteTitleAr').value = globalData.settings.siteTitleAr || '';
        document.getElementById('siteSubtitleEn').value = globalData.settings.siteSubtitleEn || '';
        document.getElementById('siteSubtitleAr').value = globalData.settings.siteSubtitleAr || '';
        document.getElementById('browserTitleEn').value = globalData.settings.browserTitleEn || '';
        document.getElementById('browserTitleAr').value = globalData.settings.browserTitleAr || '';
        document.getElementById('videoBadgeEn').value = globalData.settings.videoBadgeEn || '';
        document.getElementById('videoBadgeAr').value = globalData.settings.videoBadgeAr || '';
        const t = globalData.settings.texts;
        document.getElementById('whatsappNumber').value = t.whatsappNumber || '';
        document.getElementById('countryCode').value = t.countryCode || '';
        document.getElementById('textNameEn').value = t.nameEn || ''; document.getElementById('textNameAr').value = t.nameAr || '';
        document.getElementById('textPhoneEn').value = t.phoneEn || ''; document.getElementById('textPhoneAr').value = t.phoneAr || '';
        document.getElementById('textDetailsEn').value = t.detailsEn || ''; document.getElementById('textDetailsAr').value = t.detailsAr || '';
        document.getElementById('textWhatsAppEn').value = t.whatsappEn || ''; document.getElementById('textWhatsAppAr').value = t.whatsappAr || '';
        document.getElementById('textCloseEn').value = t.closeEn || ''; document.getElementById('textCloseAr').value = t.closeAr || '';
        document.getElementById('textRefreshEn').value = t.refreshEn || ''; document.getElementById('textRefreshAr').value = t.refreshAr || '';
        document.getElementById('textNewTabEn').value = t.newTabEn || ''; document.getElementById('textNewTabAr').value = t.newTabAr || '';
        document.getElementById('textPreviewCloseEn').value = t.previewCloseEn || ''; document.getElementById('textPreviewCloseAr').value = t.previewCloseAr || '';
        document.getElementById('textPreviewNoteEn').value = t.previewNoteEn || ''; document.getElementById('textPreviewNoteAr').value = t.previewNoteAr || '';
        document.getElementById('textCardOpenEn').value = t.cardOpenEn || ''; document.getElementById('textCardOpenAr').value = t.cardOpenAr || '';
        document.getElementById('textCardBuyEn').value = t.cardBuyEn || ''; document.getElementById('textCardBuyAr').value = t.cardBuyAr || '';
        document.getElementById('adminPanel').style.display = 'block';
        document.body.style.overflow = 'hidden';
    };
    window.hideAdminPanel = ()=> {
        document.getElementById('adminPanel').style.display = 'none';
        document.body.style.overflow = 'auto';
    };
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        const activePanel = document.getElementById(`tab-${tab}`);
        if(activePanel) activePanel.classList.add('active');
        if(event && event.target) event.target.classList.add('active');
    };
    window.exportData = function() {
        const blob = new Blob([JSON.stringify(globalData,null,2)],{type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `aser-bilingual.json`;
        a.click();
    };
    window.importData = function() {
        const inp = document.createElement('input');
        inp.type='file';
        inp.accept='.json';
        inp.onchange = e => {
            const f=e.target.files[0];
            const r=new FileReader();
            r.onload=ee=>{
                try {
                    const j=JSON.parse(ee.target.result);
                    if(j.designs && j.settings) {
                        globalData = j;
                        saveData();
                        renderDesigns();
                        updateOfferBar();
                        updateSeoWordsDisplay();
                        updateSiteTitleDisplay();
                        updateBrowserTitleDisplay();
                        applyCustomTexts();
                        applyVideoBadge();
                        if(globalData.settings.videoUrl) {
                            document.getElementById('videoSource').src = globalData.settings.videoUrl;
                            document.getElementById('mainVideo').load();
                            document.getElementById('mainVideo').play();
                        }
                        alert('تم الاستيراد بنجاح');
                    } else alert('ملف غير صالح');
                } catch(e){ alert('خطأ في قراءة الملف'); }
            };
            r.readAsText(f);
        };
        inp.click();
    };

    // init
    loadData();
    renderDesigns();
    updateOfferBar();
    updateSeoWordsDisplay();
    updateSiteTitleDisplay();
    updateBrowserTitleDisplay();
    applyCustomTexts();
    applyVideoBadge();
    const videoSource = document.getElementById('videoSource');
    const mainVideo = document.getElementById('mainVideo');
    if(videoSource && globalData.settings.videoUrl) {
        videoSource.src = globalData.settings.videoUrl;
        if(mainVideo) { mainVideo.load(); mainVideo.play(); }
    }

    // Firebase listener for real-time updates
    if(database) {
        database.ref('aser_studio_bilingual').on('value', (snap) => {
            const d = snap.val();
            if(d && JSON.stringify(d) !== JSON.stringify(globalData)) {
                globalData = d;
                renderDesigns();
                updateOfferBar();
                updateSeoWordsDisplay();
                updateSiteTitleDisplay();
                updateBrowserTitleDisplay();
                applyCustomTexts();
                applyVideoBadge();
                if(globalData.settings.videoUrl) {
                    document.getElementById('videoSource').src = globalData.settings.videoUrl;
                    document.getElementById('mainVideo').load();
                    document.getElementById('mainVideo').play();
                }
                showNotification('🔄 تحديث مباشر');
            }
        });
    }
</script>
