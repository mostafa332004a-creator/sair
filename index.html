<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title id="dynamicTitle">aser Web - متجر التصميمات</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter + Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Swiper (light) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <!-- Firebase - شغال تاني -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* نفس الأنماط السابقة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(-45deg, #667eea, #764ba2, #6b8cff, #a363d9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #1e1e2f;
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }
        body[dir="rtl"] { font-family: 'Cairo', 'Inter', sans-serif; }
        @keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .brand {
            text-align: center;
            padding: 1.2rem 1rem 0.4rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .brand h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #f0f3fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .brand p { color: rgba(255,255,255,0.9); font-weight: 400; margin-top: 0.2rem; }

        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .lang-toggle:hover { background: linear-gradient(135deg, #667eea, #764ba2); transform: scale(1.05); }

        .offer-bar {
            background: rgba(12,20,36,0.9);
            backdrop-filter: blur(5px);
            color: #ffdb9d;
            padding: 15px 0;
            overflow: hidden;
            white-space: nowrap;
            border-block: 2px solid rgba(255,255,255,0.15);
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .offer-bar .offer-slide {
            display: inline-block;
            animation: scrollOffer 30s linear infinite;
        }
        .offer-bar .offer-slide span {
            margin-right: 60px;
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .offer-bar .offer-slide i { margin: 0 15px; color: #ffb86b; font-size: 1.1rem; }
        @keyframes scrollOffer { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .video-slider { max-width: 1300px; margin: 2rem auto 1.5rem; padding: 0 20px; }
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 40px;
            overflow: hidden;
            aspect-ratio: 16 / 7;
            background: #111a2b;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.5);
        }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-container .video-badge-text {
            position: absolute;
            bottom: 20px;
            left: 30px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: calc(100% - 60px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 10;
        }

        .design-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 25px;
        }
        .design-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        .design-card:hover { transform: translateY(-10px); }
        .card-media {
            aspect-ratio: 1/1;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 3px solid white;
            position: relative;
            background: #000;
        }
        .card-media video { width: 100%; height: 100%; object-fit: cover; display: block; animation: subtleZoom 8s infinite alternate ease-in-out; }
        @keyframes subtleZoom { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        .video-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(3px);
        }
        .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .design-title { font-size: 1.6rem; font-weight: 900; background: linear-gradient(145deg, #121826, #2c3a6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .price-row { display: flex; gap: 5px; background: #eef2f9; padding: 5px 14px; border-radius: 60px; font-weight: 700; }
        .design-desc { color: #2f405c; font-size: 0.95rem; margin: 12px 0 15px; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-open, .btn-buy { flex: 1; border-radius: 50px; padding: 12px; cursor: pointer; border: none; font-weight: 700; transition: transform 0.2s; }
        .btn-open { background: white; border: 2px solid #1d2b44; color: #1d2b44; }
        .btn-buy { background: #ff8a4c; color: white; box-shadow: 0 5px 12px #ff8a4c80; }
        .btn-open:hover, .btn-buy:hover { transform: translateY(-2px); }

        .seo-footer {
            background: rgba(12,20,36,0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(255,255,255,0.15);
            border-bottom: 2px solid rgba(255,255,255,0.15);
            padding: 25px 20px;
            margin-top: 40px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        .seo-container { max-width: 1300px; margin: 0 auto; }
        .seo-title { color: #ffb86b; font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .seo-words-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 15px;
            scrollbar-width: thin;
            scrollbar-color: #667eea #2d2d4a;
        }
        .seo-words-wrapper::-webkit-scrollbar { height: 8px; }
        .seo-words-wrapper::-webkit-scrollbar-track { background: #2d2d4a; border-radius: 10px; }
        .seo-words-wrapper::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; }
        .seo-words { display: flex; flex-wrap: nowrap; gap: 15px; min-width: min-content; padding: 5px 0; }
        .seo-word {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            animation: floatWord 3s ease-in-out infinite;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .seo-word:nth-child(odd) { animation-delay: 0.5s; } .seo-word:nth-child(3n) { animation-delay: 1s; } .seo-word:nth-child(5n) { animation-delay: 1.5s; }
        @keyframes floatWord { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-5px) scale(1.05);} }
        .seo-word:hover { background: linear-gradient(135deg, #667eea, #764ba2); transform: scale(1.1) translateY(-5px); cursor: pointer; }

        .admin-btn {
            position: fixed;
            right: 25px;
            bottom: 25px;
            z-index: 1500;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            border: 3px solid white;
            animation: pulse 2s infinite;
            font-size: 24px;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

        .admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow: auto;
            direction: rtl;
            font-family: 'Cairo', 'Inter', sans-serif;
        }
        .admin-box {
            max-width: 1400px;
            margin: auto;
            background: #1a1c2e;
            color: #fff;
            border-radius: 30px;
            box-shadow: 0 35px 90px rgba(0,0,0,0.6);
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .admin-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .admin-header h2 { margin: 0; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; }
        .close-admin { background: #ff4444; border: none; color: white; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 1rem; }

        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 25px; }
        .tab { padding: 12px 25px; border-radius: 50px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }
        .panel { display: none; }
        .panel.active { display: block; }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 8px; font-weight: 700; color: rgba(255,255,255,0.9); font-size: 1rem; }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
        }
        .field textarea { min-height: 120px; resize: vertical; line-height: 1.7; }
        .field textarea::placeholder { color: rgba(255,255,255,0.5); }
        .helper-text { font-size: 0.85rem; color: #ffb86b; margin-top: 5px; }
        
        .lang-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .lang-row input { flex: 1; }
        .lang-badge { background: #667eea; padding: 5px 15px; border-radius: 40px; font-size: 0.9rem; white-space: nowrap; }
        
        .save-btn {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin: 15px 0;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .save-btn:hover { transform: translateY(-2px); }
        .items-list { margin-top: 25px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; max-height: 450px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; gap: 15px; padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px; background: rgba(255,255,255,0.02); }
        .item-info { flex: 1; }
        .item-info .title { font-weight: 700; margin-bottom: 5px; font-size: 1.1rem; }
        .item-info .meta { font-size: 0.9rem; opacity: 0.7; }
        .danger-btn { background: #ff4444; border: none; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 700; }
        .success-btn { background: #28a745; border: none; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 700; }

        .preview-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
            visibility: hidden; opacity: 0; transition: 0.2s; padding: 20px;
        }
        .preview-modal.active { visibility: visible; opacity: 1; }
        .preview-content { background: white; max-width: 1300px; width: 100%; border-radius: 40px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .preview-header h2 { font-size: 2rem; background: linear-gradient(145deg, #121826, #2c3a6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .preview-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .preview-controls button, .preview-controls a { padding: 12px 25px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; background: #f0f2f5; color: #1e1e2f; }
        .preview-controls .primary-btn { background: #667eea; color: white; }
        .iframe-container { width: 100%; height: 65vh; border-radius: 20px; overflow: hidden; border: 2px solid #eef2f9; background: #fff; }
        .iframe-container iframe { width: 100%; height: 100%; border: none; }
        .preview-note { margin-top: 15px; padding: 12px; background: #fff3cd; border-radius: 40px; color: #856404; font-size: 0.95rem; text-align: center; }

        .purchase-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 3000;
            visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .purchase-modal.active { visibility: visible; opacity: 1; }
        .purchase-content { background: white; max-width: 500px; width: 90%; border-radius: 40px; padding: 30px; }
        .purchase-content h2 { margin-bottom: 10px; color: #1e1e2f; }
        .purchase-content p { margin-bottom: 20px; color: #4a5568; }
        .purchase-content input, .purchase-content textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 30px; border: 1px solid #ddd; font-family: 'Inter', sans-serif; }
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 18px; width: 100%; border-radius: 40px; font-weight: 700; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        .close-purchase-btn { margin-top: 10px; width: 100%; padding: 15px; border-radius: 40px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 600; }

        @media (max-width: 1024px) { .brand h1 { font-size: 2.4rem; } .video-container { aspect-ratio: 16/8; } }
        @media (max-width: 768px) {
            .brand h1 { font-size: 2rem; } .offer-bar { font-size: 1rem; } .video-container { aspect-ratio: 16/9; border-radius: 30px; }
            .design-grid { grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); } .admin-box { padding: 20px; }
            .preview-header h2 { font-size: 1.6rem; } .tabs { gap: 8px; } .tab { padding: 10px 18px; font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            .brand h1 { font-size: 1.8rem; } .offer-bar { font-size: 0.9rem; } .video-container { border-radius: 24px; aspect-ratio: 16/10; }
            .design-grid { grid-template-columns: 1fr; } .card-header { flex-direction: column; } .price-row { align-self: flex-start; }
            .seo-word { padding: 8px 18px; font-size: 1rem; } .admin-btn { width: 50px; height: 50px; font-size: 20px; right: 15px; bottom: 15px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
        .btn-open, .btn-buy, .tab, .save-btn, .danger-btn, .success-btn, .whatsapp-btn { -webkit-tap-highlight-color: transparent; }
        @keyframes slideDown { from { transform: translate(-50%,-100%); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }
        @keyframes slideUp { from { transform: translate(-50%,0); opacity: 1; } to { transform: translate(-50%,-100%); opacity: 0; } }
    </style>
</head>
<body dir="ltr">
<!-- العنوان الديناميكي -->
<title id="dynamicTitle">aser Web·MO - متجر التصميمات</title>

<!-- زر تغيير اللغة -->
<div class="lang-toggle" onclick="toggleLanguage()"><i class="fas fa-language"></i> <span id="langBtnText">AR</span></div>

<div class="brand"><h1 id="siteTitle">آسر للتصميم · ASER STUDIO</h1><p id="siteSubtitle">تصميم مواقع · motion · identity</p></div>
<div class="offer-bar"><div class="offer-slide" id="offerSlide"></div></div>

<div class="video-slider">
    <div class="video-container">
        <video id="mainVideo" autoplay muted loop playsinline><source id="videoSource" src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" type="video/mp4"></video>
        <div class="video-badge-text" id="mainVideoBadge">⚡ ASER SHOWREEL • always moving</div>
    </div>
</div>

<!-- شبكة التصميمات -->
<div class="design-grid" id="designGrid"></div>

<div class="seo-footer">
    <div class="seo-container">
        <div class="seo-title" id="seoTitle"><i class="fas fa-tags"></i> POPULAR SEARCH TERMS</div>
        <div class="seo-words-wrapper"><div class="seo-words" id="seoWords"></div></div>
    </div>
</div>

<div class="admin-btn" onclick="showAdminPanel()"><i class="fas fa-cog"></i></div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-box">
        <div class="admin-header"><h2><i class="fas fa-crown"></i> لوحة التحكم - مزامنة مع جميع الأجهزة</h2><button class="close-admin" onclick="hideAdminPanel()"><i class="fas fa-times"></i> إغلاق</button></div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('designs')"><i class="fas fa-paint-brush"></i> التصميمات</button>
            <button class="tab" onclick="switchTab('offers')"><i class="fas fa-tags"></i> العروض</button>
            <button class="tab" onclick="switchTab('seo')"><i class="fas fa-search"></i> كلمات SEO</button>
            <button class="tab" onclick="switchTab('settings')"><i class="fas fa-sliders-h"></i> الإعدادات</button>
            <button class="tab" onclick="switchTab('texts')"><i class="fas fa-font"></i> النصوص وواتساب</button>
            <button class="tab" onclick="switchTab('site')"><i class="fas fa-globe"></i> عنوان الموقع</button>
            <button class="tab" onclick="switchTab('browserTitle')"><i class="fas fa-window-maximize"></i> عنوان المتصفح</button>
            <button class="tab" onclick="switchTab('export')"><i class="fas fa-download"></i> تصدير/استيراد</button>
            <button class="tab" onclick="switchTab('videobadge')"><i class="fas fa-video"></i> كلمة الفيديو</button>
        </div>

        <!-- designs -->
        <div id="tab-designs" class="panel active">
            <div class="grid-2">
                <div class="field"><label>🇬🇧 عنوان EN</label><input id="designTitleEn" placeholder="Professional Cleaning Website"></div>
                <div class="field"><label>🇸🇦 عنوان AR</label><input id="designTitleAr" placeholder="موقع شركة نظافة محترف"></div>
                <div class="field"><label>💰 السعر</label><input id="designPrice" type="number" value="150"></div>
                <div class="field"><label>🎬 رابط الفيديو</label><input id="designVideo" placeholder="https://files.catbox.moe/....mp4"></div>
                <div class="field"><label>🇬🇧 رابط المعاينة EN</label><input id="designPreviewEn" placeholder="https://example.com/en"></div>
                <div class="field"><label>🇸🇦 رابط المعاينة AR</label><input id="designPreviewAr" placeholder="https://example.com/ar"></div>
                <div class="field" style="grid-column:1/-1"><label>🇬🇧 وصف EN</label><textarea id="designDescEn" placeholder="English description..."></textarea></div>
                <div class="field" style="grid-column:1/-1"><label>🇸🇦 وصف AR</label><textarea id="designDescAr" placeholder="الوصف بالعربية..."></textarea></div>
            </div>
            <button class="save-btn" onclick="addDesign()"><i class="fas fa-plus"></i> إضافة تصميم جديد</button>
            <div class="items-list" id="designsList"></div>
        </div>

        <div id="tab-offers" class="panel">
            <div class="field"><label>🇬🇧 Offers</label><textarea id="offerTextEn" placeholder="🔥 FLASH 25% OFF"></textarea></div>
            <div class="field"><label>🇸🇦 العروض</label><textarea id="offerTextAr" placeholder="🔥 خصم 25%"></textarea></div>
            <button class="save-btn" onclick="updateOffers()"><i class="fas fa-save"></i> حفظ العروض</button>

    // دالة محدثة لحساب طول النص وتحديد سرعة الحركة
    function updateOfferBar() {
        const offerSlide = document.getElementById('offerSlide');
        if (!offerSlide) return;
        
        let html = ''; 
        const arr = currentLang === 'en' ? (globalData.settings.offersEn || []) : (globalData.settings.offersAr || []);
        
        // تكرار النص مرتين للحركة المستمرة
        for(let i=0; i<2; i++) arr.forEach(o => html += `<span>${o}</span> <i class="fa-regular fa-star"></i> `);
        
        offerSlide.innerHTML = html || '<span>🔥 SPECIAL OFFERS 🔥</span> <i class="fa-regular fa-star"></i> ';
        
        // حساب عدد الأحرف الكلي في النص
        const totalChars = html.length;
        
        // تحديد سرعة الحركة بناءً على عدد الأحرف
        // كلما زاد عدد الأحرف، زادت مدة الحركة (أبطأ)
        let animationDuration = 30; // القيمة الافتراضية 30 ثانية
        
        if (totalChars > 500) {
            animationDuration = 50; // نص طويل جداً
        } else if (totalChars > 300) {
            animationDuration = 40; // نص طويل
        } else if (totalChars > 150) {
            animationDuration = 35; // نص متوسط
        }
        
        // تطبيق المدة الجديدة على الأنيميشن
        offerSlide.style.animation = `scrollOffer ${animationDuration}s linear infinite`;
        
        console.log(`📊 عدد أحرف الشريط: ${totalChars}, مدة الحركة: ${animationDuration} ثانية`);
    }

    window.importData = function() { 
        const inp = document.createElement('input');

        inp.accept='.json'; 
        inp.onchange = e => { 
            const f=e.target.files[0]; 
            const r=new FileReader(); 
            r.onload=ee=>{ 
                try { 
                    const j=JSON.parse(ee.target.result); 
                    if(j.designs && j.designs.length > 0) { 
                        globalData.designs = j.designs; 
                    }
                    if(j.settings) {
                        globalData.settings = {...globalData.settings, ...j.settings};
                    }
                    validateAndRestoreData();
                    saveData(); 
                    renderDesigns(); 
                    updateOfferBar(); 
                    updateSeoWordsDisplay(); 
                    updateSiteTitleDisplay(); 
                    updateBrowserTitleDisplay(); 
                    applyCustomTexts(); 
                    applyVideoBadge(); 
                    if(globalData.settings.videoUrl) {
                        document.getElementById('videoSource').src = globalData.settings.videoUrl; 
                        document.getElementById('mainVideo').load(); 
                        document.getElementById('mainVideo').play(); 
                    }
                    alert('تم الاستيراد بنجاح'); 
                } catch(e){ 
                    alert('خطأ في الاستيراد: ' + e.message); 
                } 
            }; 
            r.readAsText(f); 
        }; 
        inp.click(); 
    };

    // استماع للتحديثات من Firebase (بس لو فيه بيانات)
    function listenForUpdates() { 
        if(database) {
            database.ref('aser_studio_data').on('value', (snap) => { 
                const d = snap.val(); 
                // لو البيانات فاضية، تجاهلها
                if(!d || !d.designs || d.designs.length === 0) {
                    console.log('⚠️ Firebase جاب بيانات فاضية - تم التجاهل');
                    return;
                }
                
                // لو البيانات مختلفة عن الحالية، حدث
                if(JSON.stringify(d.designs) !== JSON.stringify(globalData.designs)) { 
                    console.log('🔄 تحديث من Firebase');
                    globalData.designs = d.designs; 
                    if(d.settings) globalData.settings = {...globalData.settings, ...d.settings};
                    
                    // حفظ محلياً
                    localStorage.setItem('aser_design_data', JSON.stringify(globalData));
                    
                    // تحديث الواجهة
                    renderDesigns(); 
                    updateOfferBar(); 
                    updateSeoWordsDisplay(); 
                    updateSiteTitleDisplay(); 
                    updateBrowserTitleDisplay(); 
                    applyCustomTexts(); 
                    applyVideoBadge(); 
                    
                    showNotification('🔄 تم التحديث من جهاز آخر'); 
                } 
            }); 
        }
    }

    // ========== بدء التشغيل ==========
    loadData();
    renderDesigns();
    updateOfferBar();
    updateSeoWordsDisplay();
    updateSiteTitleDisplay();
    updateBrowserTitleDisplay();
    applyCustomTexts();
    applyVideoBadge();
    
    const videoSource = document.getElementById('videoSource');
    const mainVideo = document.getElementById('mainVideo');
    if(videoSource && globalData.settings.videoUrl) {
        videoSource.src = globalData.settings.videoUrl;
        if(mainVideo) { mainVideo.load(); mainVideo.play(); }
    }
    
    // استماع لتحديثات Firebase
    listenForUpdates();
    
    // فحص دوري كل دقيقة للتأكد من سلامة البيانات
    setInterval(() => {
        validateAndRestoreData();
        renderDesigns();
    }, 60000);
    
    console.log('✅ الموقع جاهز مع', globalData.designs.length, 'تصميم');
</script>
</body>
</html>
